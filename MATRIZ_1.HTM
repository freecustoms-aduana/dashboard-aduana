<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ADUANA - Matriz de Perfil de Puesto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#131D4F;
  --card:#FFFFFF;
  --lavanda:#E0E3FF;
  --lavanda2:#C8CCFA;
  --border:rgba(30,45,107,0.10);
  --border-acc:rgba(30,45,107,0.20);
  --text:#1E2D6B;
  --muted:#5B6CA8;
  --muted2:#9AA5D4;
  --acc:#1E2D6B;
  --verde:#059669;
  --verde-dim:rgba(5,150,105,0.10);
  --rojo:#DC2626;
  --gold:#9A7209;
  --gold-dim:rgba(184,134,11,0.12);
  --gold-border:rgba(154,114,9,0.30);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* ══ TOPBAR ══ */
.topbar{
  background:#FFFFFF;
  border-bottom:1px solid var(--border);
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:0 1px 6px rgba(30,45,107,0.07);
  height:64px;
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.brand-badge{
  width:38px;height:38px;border-radius:10px;
  background:var(--acc);color:#fff;
  font-weight:900;font-size:13px;letter-spacing:-.5px;
  display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-info{}
.brand-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;}
.brand-sub{font-size:11px;color:var(--muted);font-weight:500;}

.topbar-divider{width:1px;height:28px;background:var(--border);margin:0 4px;}

.topbar-right{display:flex;align-items:center;gap:10px;}
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:#F5F6FF;border:1px solid var(--border);
  border-radius:20px;padding:7px 16px;
  transition:border-color .2s;
}
.search-bar:focus-within{border-color:var(--acc);}
.search-bar svg{color:var(--muted);flex-shrink:0;}
.search-bar input{
  background:none;border:none;outline:none;
  color:var(--text);font-size:13px;width:220px;
  font-family:'Poppins',sans-serif;
}
.search-bar input::placeholder{color:var(--muted2);}
.badge{font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;}
.badge-count{background:var(--acc);color:#fff;}
.doc-ref{font-size:10px;color:var(--muted);text-align:right;line-height:1.8;}
.doc-ref strong{color:var(--acc);}

/* ══ CONTENT ══ */
.content{padding:32px 40px;}

/* ══ GRID ══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;}

/* ══ CARD ══ */
.pos-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .2s,transform .18s,box-shadow .2s;
  display:flex;flex-direction:column;
  box-shadow:0 2px 8px rgba(30,45,107,0.06);
}
.pos-card:hover{
  border-color:var(--border-acc);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(30,45,107,0.13);
}
.pos-card.hidden{display:none;}

.card-top-strip{height:4px;background:var(--acc);}

.card-body{flex:1;padding:22px 24px 0;display:flex;flex-direction:column;gap:12px;}

.card-level{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--lavanda);color:var(--acc);
  border-radius:20px;font-size:9px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  padding:3px 10px;align-self:flex-start;
}
.card-name{font-size:18px;font-weight:800;color:var(--text);line-height:1.25;}

.card-badges{display:flex;flex-wrap:wrap;gap:6px;min-height:24px;}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;font-weight:600;
  padding:4px 12px;border-radius:20px;white-space:nowrap;
}
.pill-exp{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);}
.pill-lang{background:#EEF0FF;color:#1E2D6B;border:2px solid var(--lavanda2);font-size:12px;}
.pill-lang img{width:22px;height:16px;border-radius:2px;object-fit:cover;display:inline-block;vertical-align:middle;margin-top:-1px;}
.pill-none{background:#F5F6FF;color:var(--muted2);border:1px solid var(--border);font-style:italic;font-size:10.5px;font-weight:500;}

.card-stats{
  display:flex;
  border-top:1px solid var(--border);
  margin:8px -24px 0;
  background:#F5F6FF;
  border-radius:0 0 16px 16px;
  overflow:hidden;
}
.stat-cell{flex:1;padding:13px 8px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-n{font-size:22px;font-weight:800;color:var(--text);line-height:1;}
.stat-l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}

/* ══ MODAL ══ */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(19,29,79,0.55);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  backdrop-filter:blur(3px);
}
.overlay.visible{opacity:1;pointer-events:all;}

.modal{
  background:#FFFFFF;
  border:1px solid var(--border-acc);
  border-radius:20px;
  width:100%;max-width:880px;
  max-height:88vh;
  display:flex;flex-direction:column;
  transform:translateY(20px) scale(.97);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  box-shadow:0 24px 80px rgba(30,45,107,0.25);
}
.overlay.visible .modal{transform:translateY(0) scale(1);}

.modal-top-strip{height:4px;background:var(--acc);flex-shrink:0;}

.modal-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:24px 32px 18px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;gap:16px;
}
.modal-head-left{display:flex;flex-direction:column;gap:10px;}
.modal-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--lavanda);color:var(--acc);
  border-radius:20px;font-size:9px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;padding:3px 12px;
  align-self:flex-start;
}
.modal-title{font-size:24px;font-weight:800;color:var(--text);line-height:1.2;}
.modal-badges{display:flex;flex-wrap:wrap;gap:8px;}

.modal-close{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--bg);border:1px solid var(--border);
  color:var(--muted);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,border-color .15s;
  font-family:'Poppins',sans-serif;
}
.modal-close{background:#F5F6FF;}
.modal-close:hover{background:var(--acc);color:#fff;border-color:var(--acc);}

.modal-tabs{
  display:flex;border-bottom:1px solid var(--border);
  flex-shrink:0;padding:0 32px;background:#fff;
}
.mtab{
  padding:13px 22px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
  display:flex;align-items:center;gap:7px;
}
.mtab:hover{color:var(--text);}
.mtab.active{color:var(--acc);border-bottom-color:var(--acc);}
.mtab .cnt{
  background:var(--lavanda);color:var(--acc);
  font-size:10px;font-weight:700;
  padding:1px 8px;border-radius:20px;
}
.mtab.active .cnt{background:var(--acc);color:#fff;}

.modal-body{flex:1;overflow-y:auto;padding:22px 32px 32px;background:#F5F6FF;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--lavanda2);border-radius:4px;}

.mpanel{display:none;flex-direction:column;gap:8px;}
.mpanel.active{display:flex;}

.mrow{
  display:flex;gap:14px;align-items:flex-start;
  padding:12px 16px;border-radius:12px;
  background:#FFFFFF;border:1px solid var(--border);
  transition:border-color .12s,box-shadow .12s;
}
.mrow:hover{border-color:var(--border-acc);box-shadow:0 2px 8px rgba(30,45,107,0.08);}

.mnum{
  min-width:26px;height:26px;border-radius:50%;
  background:var(--lavanda);color:var(--acc);
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:8px;}
.mdot.req{background:var(--acc);}
.mdot.comp{background:var(--amber);}

.mtext{font-size:14px;color:#2E3F80;line-height:1.65;}

.no-results{text-align:center;padding:60px 0;color:var(--muted);font-size:15px;display:none;}

/* ══ DIFF TAB ══ */
.diff-rename{
  display:flex;align-items:center;gap:10px;
  background:#EEF0FF;border:1px solid var(--lavanda2);
  border-radius:12px;padding:12px 16px;margin-bottom:4px;
  font-size:13px;color:var(--acc);font-weight:600;
}
.diff-rename span{font-weight:400;color:var(--muted);}
.diff-section-title{
  font-size:10px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  margin:14px 0 6px;padding-left:4px;
}
.diff-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:11px 14px;border-radius:10px;
  font-size:13.5px;line-height:1.6;
  border:1px solid transparent;margin-bottom:4px;
}
.diff-row.added{background:rgba(5,150,105,0.07);border-color:rgba(5,150,105,0.20);color:#065F46;}
.diff-row.removed{background:rgba(220,38,38,0.06);border-color:rgba(220,38,38,0.18);color:#991B1B;}
.diff-row.changed{background:rgba(154,114,9,0.08);border-color:rgba(154,114,9,0.22);color:#78350F;}
.diff-icon{font-size:14px;flex-shrink:0;margin-top:2px;}
.diff-no-change{
  text-align:center;padding:32px 0;color:var(--muted2);
  font-size:13px;font-style:italic;
}
</style>
</head>

    </div>
    <div class="modal-body">
      <div class="mpanel active" id="mp-tasks"></div>
      <div class="mpanel"        id="mp-reqs"></div>
      <div class="mpanel"        id="mp-comps"></div>
      <div class="mpanel"        id="mp-diff"></div>

  </div>
</div>

function buildDiffHTML(i) {
  const d = DIFF_DATA[i];
  let html = '';
  if (d.renamed_from) {
    html += `<div class="diff-rename">🔄 <strong>Renombrado</strong> <span>Nombre 2025: <em>${d.renamed_from}</em></span></div>`;
  }
  let totalChanges = d.renamed_from ? 1 : 0;
  for (const sec of d.sections) {
    const hasContent = sec.added.length || sec.removed.length || sec.changed.length;
    if (!hasContent) continue;
    html += `<div class="diff-section-title">${sec.label}</div>`;
    for (const t of sec.added)   { html += `<div class="diff-row added"><span class="diff-icon">＋</span>${t}</div>`; totalChanges++; }
    for (const t of sec.removed) { html += `<div class="diff-row removed"><span class="diff-icon">－</span>${t}</div>`; totalChanges++; }
    for (const t of sec.changed) { html += `<div class="diff-row changed"><span class="diff-icon">✏️</span>${t}</div>`; totalChanges++; }
  }
  if (!html) html = '<div class="diff-no-change">Sin cambios sustantivos respecto a 2025.</div>';
  return { html, count: totalChanges };
}

function buildCard(p, i) {
  const search = [p.name,...p.tasks,...p.requirements,...p.competencies].join(' ').toLowerCase();
  const badges = [
    p.exp  ? `<span class="pill pill-exp">⏱ ${p.exp}</span>` : '',
    p.lang ? `<span class="pill pill-lang"><img src="https://flagcdn.com/w40/gb.png" alt="UK"> ${p.lang}</span>` : '',
  ].join('') || `<span class="pill pill-none">Sin experiencia previa requerida</span>`;

  return `
<div class="pos-card" id="card-${i}" data-search="${search}" onclick="openModal(${i})">
  <div class="card-top-strip"></div>
  <div class="card-body">
    <div class="card-name">${p.name}</div>
    <div class="card-badges">${badges}</div>
    <div class="card-stats">
      <div class="stat-cell"><div class="stat-n">${p.tasks.length}</div><div class="stat-l">Tareas</div></div>
      <div class="stat-cell"><div class="stat-n">${p.requirements.length}</div><div class="stat-l">Requerimientos</div></div>
      <div class="stat-cell"><div class="stat-n">${p.competencies.length}</div><div class="stat-l">Competencias</div></div>
    </div>
  </div>
</div>`;
}

function openModal(i) {
  const p = DATA[i];
  document.getElementById('m-title').textContent = p.name;

  const badges = [
    p.exp  ? `<span class="pill pill-exp">⏱ ${p.exp}</span>` : '',
    p.lang ? `<span class="pill pill-lang"><img src="https://flagcdn.com/w40/gb.png" alt="UK"> ${p.lang}</span>` : '',
  ].join('');
  document.getElementById('m-badges').innerHTML = badges;

  document.getElementById('cnt-tasks').textContent = p.tasks.length;
  document.getElementById('cnt-reqs').textContent  = p.requirements.length;
  document.getElementById('cnt-comps').textContent = p.competencies.length;

  document.getElementById('mp-tasks').innerHTML = p.tasks.map((t, j) =>
    `<div class="mrow"><div class="mnum">${j+1}</div><div class="mtext">${t}</div></div>`
  ).join('');
  document.getElementById('mp-reqs').innerHTML = p.requirements.map(r =>
    `<div class="mrow"><div class="mdot req"></div><div class="mtext">${r}</div></div>`
  ).join('');
  document.getElementById('mp-comps').innerHTML = p.competencies.map(c =>
    `<div class="mrow"><div class="mdot comp"></div><div class="mtext">${c}</div></div>`
  ).join('');

  const diffResult = buildDiffHTML(i);
  document.getElementById('mp-diff').innerHTML = diffResult.html;
  document.getElementById('cnt-diff').textContent = diffResult.count || '';

  switchModal('tasks');
  document.getElementById('overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function switchModal(tab) {
  ['tasks','reqs','comps','diff'].forEach(t => {
    document.getElementById('mp-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('modal').querySelector('.modal-body').scrollTop = 0;
}

function doSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let n = 0;
  document.querySelectorAll('.pos-card').forEach(c => {
    const match = !q || c.dataset.search.includes(q);
    c.classList.toggle('hidden', !match);
    if (match) n++;
  });
  document.getElementById('count-badge').textContent = q ? `${n} de ${DATA.length}` : `${DATA.length} puestos`;
  document.getElementById('no-results').style.display = n === 0 ? 'block' : 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });

const grid = document.getElementById('grid');
DATA.forEach((p, i) => { grid.innerHTML += buildCard(p, i); });
